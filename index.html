<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILHAM BYPASS VVIP</title>
    <style>
        :root { --neon: #00fbff; --bg: #050505; --card: #111111; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .vvip-card { background: var(--card); padding: 30px; border-radius: 5px; border: 2px solid var(--neon); box-shadow: 0 0 30px rgba(0, 251, 255, 0.2); width: 95%; max-width: 450px; text-align: center; position: relative; }
        .vvip-card::before { content: "VVIP ACCESS"; position: absolute; top: -12px; left: 20px; background: var(--neon); color: black; font-weight: bold; padding: 2px 10px; font-size: 10px; }
        h1 { color: var(--neon); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 5px; font-size: 24px; }
        .status-bar { font-size: 10px; color: #555; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--neon); border-radius: 4px; outline: none; box-sizing: border-box; margin-bottom: 15px; font-size: 13px; }
        input:focus { border-color: var(--neon); }
        button { width: 100%; padding: 15px; background: var(--neon); color: black; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #loader { display: none; margin: 15px 0; color: var(--neon); font-size: 12px; }
        #result-box { display: none; margin-top: 20px; padding: 15px; background: #1a1a1a; border-left: 4px solid #00ff88; text-align: left; position: relative; }
        .key-title { font-size: 10px; color: #00ff88; display: block; }
        #finalKey { font-size: 14px; color: #fff; word-break: break-all; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="vvip-card">
    <h1>ILHAM BYPASS</h1>
    <div class="status-bar">SYSTEM STATUS: <span style="color: #00ff88;">READY</span> | BYPASS V4.0</div>
    
    <input type="text" id="targetUrl" placeholder="ENTER LINKVERTISE / DELTA LINK...">
    <button onclick="runVVIP()">EXECUTE BYPASS</button>

    <div id="loader">INJECTING EXPLOIT... PLEASE WAIT...</div>

    <div id="result-box">
        <span class="key-title">DECRYPTED KEY:</span>
        <code id="finalKey"></code>
        <button onclick="copyKey()" style="margin-top:10px; padding: 5px; font-size: 10px; background: #333; color: white;">COPY TO CLIPBOARD</button>
    </div>
</div>

<script>
    async function runVVIP() {
        const url = document.getElementById('targetUrl').value;
        const loader = document.getElementById('loader');
        const resBox = document.getElementById('result-box');
        const finalKey = document.getElementById('finalKey');

        if(!url) return alert("Link Kosong, Mase!");

        loader.style.display = "block";
        resBox.style.display = "none";

        try {
            // Ini adalah jalur API VVIP (Fluxus/Delta/Linkvertise)
            // Gue pake jalur ad-free bypasser (Layanan ini lebih stabil)
            const response = await fetch(`https://api.bypass.vip/bypass?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if(data.status === "success" || data.result) {
                finalKey.innerText = data.result || data.destination;
                loader.style.display = "none";
                resBox.style.display = "block";
            } else {
                throw new Error();
            }
        } catch (err) {
            loader.style.display = "none";
            alert("VVIP API Sedang Maintenance / Limit. Coba lagi 1 menit lagi!");
        }
    }

    function copyKey() {
        const text = document.getElementById('finalKey').innerText;
        navigator.clipboard.writeText(text);
        alert("ACCESS GRANTED - KEY COPIED");
    }
</script>

</body>
</html>
