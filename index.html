<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILHAM BYPASS | DELTA INSTANT</title>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #15151b; padding: 25px; border-radius: 15px; border: 1px solid #00fbff; box-shadow: 0 0 20px #00fbff33; width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #00fbff; margin-bottom: 5px; }
        p { font-size: 12px; color: #aaa; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0a0a0c; color: #00fbff; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00fbff; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #008c8e; }
        #output-area { margin-top: 20px; padding: 15px; border-radius: 8px; background: #0a0a0c; display: none; border: 1px dashed #00fbff; }
        .key-text { color: #00ff88; font-weight: bold; word-break: break-all; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>ILHAM BYPASS</h2>
    <p>Auto-Bypass Linkvertise / Delta Key</p>
    
    <input type="text" id="urlInput" placeholder="Paste link Delta di sini...">
    <button onclick="executeBypass()" id="btnText">BYPASS NOW</button>

    <div id="output-area">
        <span class="key-text" id="resultKey"></span>
        <button onclick="copyToClipboard()" style="background: #00ff88; font-size: 12px;">COPY KEY</button>
    </div>
</div>

<script>
    async function executeBypass() {
        const url = document.getElementById('urlInput').value;
        const btn = document.getElementById('btnText');
        const output = document.getElementById('output-area');
        const resultKey = document.getElementById('resultKey');

        if (!url) return alert("Masukkan linknya dulu, Bang!");

        btn.innerText = "PROSES BYPASS...";
        btn.disabled = true;
        output.style.display = "none";

        try {
            // Menggunakan API pihak ketiga (Bisa berubah sewaktu-waktu)
            // Note: Beberapa API butuh 'apikey' sendiri, ini versi publik
            const response = await fetch(`https://ethone.xyz/api/bypass?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.result || data.key) {
                resultKey.innerText = data.result || data.key;
                output.style.display = "block";
                btn.innerText = "BYPASS LAGI";
            } else {
                alert("Gagal bypass. Link mungkin salah atau API sedang maintenance.");
                btn.innerText = "BYPASS NOW";
            }
        } catch (error) {
            console.error(error);
            alert("Error: Server API tidak merespon. Coba lagi nanti.");
            btn.innerText = "BYPASS NOW";
        } finally {
            btn.disabled = false;
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('resultKey').innerText;
        navigator.clipboard.writeText(text);
        alert("Key berhasil di-copy!");
    }
</script>

</body>
</html>
