<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILHAM BYPASS - INSTANT</title>
    <style>
        body { background: #0f0f13; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .box { background: #1a1a20; padding: 20px; border-radius: 15px; border: 1px solid #00c6ff; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 95%; padding: 12px; background: #00c6ff; border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; color: #00ff88; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

    <div class="box">
        <h2>DELTA AUTO BYPASS</h2>
        <p>Tempel Link Linkvertise/Delta di bawah:</p>
        <input type="text" id="targetLink" placeholder="https://linkvertise.com/...">
        <button onclick="startBypass()">AUTO BYPASS SEKARANG</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function startBypass() {
            const link = document.getElementById('targetLink').value;
            const resDiv = document.getElementById('result');
            
            if(!link) return alert("Masukan link dulu!");
            
            resDiv.innerText = "Mohon tunggu, Bot lagi kerja...";

            try {
                // Ini contoh pakai API Bypasser publik (Bisa mati kapan saja)
                const response = await fetch(`https://api.bypass.vip/bypass?url=${encodeURIComponent(link)}`);
                const data = await response.json();

                if(data.status === "success") {
                    resDiv.innerHTML = `HASIL BYPASS:<br><span style="color:white">${data.result}</span>`;
                } else {
                    resDiv.innerText = "Gagal! Link mungkin sudah expired atau API Down.";
                }
            } catch (err) {
                resDiv.innerText = "Error: Bot sedang sibuk atau API tidak merespon.";
            }
        }
    </script>
</body>
</html>
